name: Keep API warm
on:
  schedule:
    # Every 10 minutes — keeps Render free tier from sleeping
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: |
          curl -sf https://libraix-api.onrender.com/health || true
          curl -sf https://libraix-api.onrender.com/api/catalog || true
