services:
  - type: web
    name: libraix-api
    runtime: node
    plan: starter
    buildCommand: cd libraix/backend && npm install --include=dev && npm run build
    startCommand: cd libraix/backend && npm run seed:owner && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://libraix.ai
      - key: DATABASE_PATH
        value: /var/data/libraix.db
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL_FAST
        value: gpt-4o
      - key: OPENAI_MODEL_SMART
        sync: false
      - key: OPENAI_MODEL_ADVANCED
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_ENTERPRISE_PRICE_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: COMPANY_ADDRESS
        value: "23 Lincoln Road, Branston, Lincoln LN4 1PE, United Kingdom"
      - key: COMPANY_LEGAL_NAME
        value: "Libraix (trading name — legal entity to be confirmed)"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    disk:
      name: libraix-data
      mountPath: /var/data
      sizeGB: 1
