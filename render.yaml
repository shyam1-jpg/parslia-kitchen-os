services:
  - type: web
    name: libraix-api
    runtime: node
    plan: starter
    buildCommand: cd libraix/backend && npm install --include=dev && npm run build
    startCommand: cd libraix/backend && (test -f /var/data/.owner-seeded || (npm run seed:owner && touch /var/data/.owner-seeded) || true) && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://libraix.ai
      - key: DATABASE_PATH
        value: /var/data/libraix.db
      # ── OpenAI (required for live chat) ──
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL_FAST
        value: gpt-4o
      - key: OPENAI_MODEL_SMART
        value: gpt-4o
      - key: OPENAI_MODEL_ADVANCED
        value: gpt-4o
      - key: OPENAI_MODEL_IMAGE
        value: dall-e-3
      - key: OPENAI_TEMPERATURE
        value: "0.7"
      - key: OPENAI_MAX_TOKENS
        value: "4096"
      # ── DeepSeek (https://platform.deepseek.com) ──
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL_CHAT
        value: deepseek-chat
      - key: DEEPSEEK_MODEL_REASONER
        value: deepseek-reasoner
      # ── Google Gemini (https://aistudio.google.com/apikey) ──
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_MODEL
        value: gemini-2.0-flash
      # ── Anthropic Claude (https://console.anthropic.com) ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-3-5-haiku-20241022
      - key: ANTHROPIC_MODEL_SMART
        value: claude-3-5-sonnet-20241022
      # ── xAI Grok (https://console.x.ai) ──
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL_FAST
        value: grok-4-1-fast-non-reasoning
      - key: XAI_MODEL_SMART
        value: grok-4-5
      # ── Email (password reset + verification) ──
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Libraix <noreply@libraix.ai>"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      # ── Stripe (Pro billing) ──
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_ENTERPRISE_PRICE_ID
        sync: false
      # ── Company / legal ──
      - key: COMPANY_ADDRESS
        value: "23 Lincoln Road, Branston, Lincoln LN4 1PE, United Kingdom"
      - key: COMPANY_LEGAL_NAME
        value: "Libraix (trading name — legal entity to be confirmed)"
      - key: COMPANY_COUNTRY
        value: United Kingdom
      # ── Owner seed (set on first deploy via Render Shell if needed) ──
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_INITIAL_PASSWORD
        sync: false
    disk:
      name: libraix-data
      mountPath: /var/data
      sizeGB: 1
