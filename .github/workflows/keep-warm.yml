# Ping Render every 10 minutes so Free/Starter cold starts hurt less.
name: Keep API warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health
        run: |
          for i in 1 2 3; do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" -m 30 https://libraix-api.onrender.com/health || echo 000)
            echo "attempt $i → HTTP $code"
            cat /tmp/health.json 2>/dev/null || true
            echo
            [[ "$code" == "200" ]] && exit 0
            sleep 15
          done
          echo "::warning::API health did not return 200"
          exit 0
