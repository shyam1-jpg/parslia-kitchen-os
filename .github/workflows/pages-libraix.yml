name: GitHub Pages — Libraix

on:
  push:
    branches: [main]
    paths:
      - "libraix/frontend/**"
      - ".github/workflows/pages-libraix.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-libraix
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: libraix/frontend/package-lock.json
      - run: cd libraix/frontend && npm ci && npm run build
        env:
          VITE_BASE: /parslia-kitchen-os/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: libraix/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
